<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Adoption - Proof of Concept</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #E8DCC4;
            overflow: hidden;
        }

        .slide-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            padding: 60px;
        }

        .slide.active {
            opacity: 1;
            z-index: 1;
        }

        /* Title Slide */
        .title-slide h1 {
            font-size: 4rem;
            color: #2C5F2D;
            margin-bottom: 20px;
            text-align: center;
        }

        .title-slide h2 {
            font-size: 2rem;
            color: #E8A0A0;
            text-align: center;
            font-weight: 300;
        }

        /* Figure Slide */
        .figure-slide {
            justify-content: flex-start;
            padding-top: 80px;
        }

        .figure-slide h2 {
            font-size: 2.5rem;
            color: #2C5F2D;
            margin-bottom: 40px;
            text-align: center;
        }

        .figure-slide img {
            max-width: 90%;
            max-height: 60vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background: white;
            padding: 20px;
        }

        .figure-slide .reference {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }

        .figure-slide .reference a {
            color: #2C5F2D;
            text-decoration: none;
            border-bottom: 1px solid #A8C9A8;
        }

        .figure-slide .reference a:hover {
            color: #A8C9A8;
            border-bottom-color: #2C5F2D;
        }

        /* Stages Slide */
        .stages-slide h2 {
            font-size: 2.5rem;
            color: #2C5F2D;
            margin-bottom: 60px;
            text-align: center;
        }

        .stages-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            max-width: 1200px;
        }

        .stage-box {
            position: relative;
            background: #B8D4B8;
            color: #2C5F2D;
            padding: 20px 30px;
            font-size: 1.1rem;
            font-weight: 500;
            min-width: 180px;
            text-align: center;
            clip-path: polygon(0 0, 20px 50%, 0 100%, calc(100% - 20px) 100%, 100% 50%, calc(100% - 20px) 0);
            transition: all 0.3s;
        }

        .stage-box.target {
            background: #8FB88F;
            color: #1A3F1B;
            border: 2px solid #000000;
            padding: 22px 32px;
            font-size: 1.15rem;
            font-weight: 600;
            transform: scale(1.05);
            z-index: 2;
        }

        .stage-box.target::after {
            content: 'Target Stage';
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: #1A3F1B;
            white-space: nowrap;
            font-weight: 600;
        }

        /* Navigation */
        .nav-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #D4C5A9;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-dot.active {
            background: #2C5F2D;
            transform: scale(1.2);
        }

        .nav-hint {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 0.8rem;
            z-index: 100;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- Slide 1: Title -->
        <div class="slide title-slide active">
            <h1>AI Adoption</h1>
            <h2>Proof of Concept</h2>
        </div>

        <!-- Slide 2: Figure -->
        <div class="slide figure-slide">
            <h2>Labor Market Impacts</h2>
            <img src="ai_adoption.png" alt="Figure 2: Labor Market Impacts">
            <div class="reference">
                Source: <a href="https://www.anthropic.com/research/labor-market-impacts" target="_blank">Anthropic - Labor Market Impacts Research</a>
            </div>
        </div>

        <!-- Slide 3: Adoption Stages -->
        <div class="slide stages-slide">
            <h2>Adoption Stages in Dev</h2>
            <div class="stages-container">
                <div class="stage-box">Auto Complete</div>
                <div class="stage-box">Chat</div>
                <div class="stage-box target">Agent Driven</div>
                <div class="stage-box">Agent Orchestration</div>
                <div class="stage-box">Fully Automatic</div>
            </div>
        </div>
    </div>

    <!-- Navigation Indicators -->
    <div class="nav-indicator">
        <div class="nav-dot active" data-slide="0"></div>
        <div class="nav-dot" data-slide="1"></div>
        <div class="nav-dot" data-slide="2"></div>
    </div>

    <div class="nav-hint">Use arrow keys or click dots to navigate</div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.nav-dot');
        const totalSlides = slides.length;

        function showSlide(n) {
            // Wrap around
            if (n >= totalSlides) {
                currentSlide = 0;
            } else if (n < 0) {
                currentSlide = totalSlides - 1;
            } else {
                currentSlide = n;
            }

            // Update slides
            slides.forEach(slide => slide.classList.remove('active'));
            slides[currentSlide].classList.add('active');

            // Update dots
            dots.forEach(dot => dot.classList.remove('active'));
            dots[currentSlide].classList.add('active');
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        function prevSlide() {
            showSlide(currentSlide - 1);
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                prevSlide();
            }
        });

        // Dot navigation
        dots.forEach(dot => {
            dot.addEventListener('click', () => {
                const slideIndex = parseInt(dot.dataset.slide);
                showSlide(slideIndex);
            });
        });

        // Hide hint after a few seconds
        setTimeout(() => {
            const hint = document.querySelector('.nav-hint');
            hint.style.opacity = '0';
        }, 3000);
    </script>
</body>
</html>
